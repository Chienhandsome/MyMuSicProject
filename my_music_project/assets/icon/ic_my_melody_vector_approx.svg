           C874 615 862 640 845 665
           C838 675 818 671 822 657
           C840 588 811 543 754 518
           L711 500
           C700 496 695 503 695 516
           L695 786
           C695 874 633 928 551 925
           C497 923 459 891 461 839
           C464 779 519 723 587 711
           C607 707 628 707 646 710 Z"/>
      <ellipse cx="558" cy="821" rx="104" ry="82" transform="rotate(-24 558 821)" fill="url(#purpleGrad)" stroke="#f0c2ff" stroke-width="4"/>
      <rect x="646" y="379" width="49" height="339" rx="24" fill="url(#purpleGrad)" opacity=".97"/>
